name: Publish to PyPI

# Trusted Publishing (OIDC) — no API token needed.
# Fires when you publish a GitHub Release. Builds sdist+wheel and uploads to PyPI.

on:
  release:
    types: [published]

jobs:
  build-and-publish:
    name: Build and publish vigil-codeintel
    runs-on: ubuntu-latest
    environment: pypi            # must match the PyPI Trusted Publisher "Environment name"
    permissions:
      id-token: write            # required for OIDC trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify metadata
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
